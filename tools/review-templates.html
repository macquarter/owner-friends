<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 답글 템플릿 | 오너프랜즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            font-size: 18px;
        }

        textarea:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .big-btn {
            font-size: 20px;
            font-weight: 800;
            padding: 1.25rem 2rem;
        }

        .tab-btn {
            font-size: 18px;
            font-weight: 700;
            padding: 1rem 2rem;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: linear-gradient(to br, #7c3aed, #5b21b6);
            color: white;
        }
    </style>
</head>

<body class="bg-gray-50">

    <div class="min-h-screen py-12 px-4">
        <div class="max-w-4xl mx-auto">

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-block bg-purple-600 text-white px-6 py-2 rounded-full font-bold mb-4">오너프랜즈 샘플</div>
                <h1 class="text-3xl md:text-4xl font-black mb-2">리뷰 답글 템플릿</h1>
                <p class="text-gray-600 text-lg">좋은/나쁜/특수 상황별 답변을 자동으로 생성하세요</p>
            </div>

            <!-- 카테고리 탭 -->
            <div class="bg-white rounded-2xl p-4 shadow-xl border-2 border-purple-100 mb-8">
                <div class="grid grid-cols-3 gap-4">
                    <button onclick="selectCategory('good')" id="tab-good"
                        class="tab-btn active bg-green-50 border-2 border-green-200 rounded-xl">
                        😊 좋은 리뷰
                    </button>
                    <button onclick="selectCategory('bad')" id="tab-bad"
                        class="tab-btn bg-red-50 border-2 border-red-200 rounded-xl">
                        😞 나쁜 리뷰
                    </button>
                    <button onclick="selectCategory('special')" id="tab-special"
                        class="tab-btn bg-blue-50 border-2 border-blue-200 rounded-xl">
                        ⭐ 특수 상황
                    </button>
                </div>
            </div>

            <!-- 생성 결과 -->
            <div class="bg-white rounded-2xl p-8 shadow-xl border-2 border-gray-100 mb-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black">💬 생성된 답글</h2>
                    <div class="flex gap-3">
                        <button onclick="generateReply()"
                            class="big-btn bg-purple-600 hover:bg-purple-700 text-white rounded-2xl transition shadow-lg">
                            🔄 새로 생성
                        </button>
                    </div>
                </div>

                <textarea id="generated-reply" readonly
                    class="w-full h-48 p-6 border-3 border-gray-300 rounded-2xl text-xl resize-none bg-gray-50"
                    placeholder="답글을 생성하려면 '새로 생성' 버튼을 클릭하세요">
                </textarea>

                <div class="mt-6 flex gap-4">
                    <button onclick="copyReply()"
                        class="big-btn flex-1 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl transition shadow-lg">
                        📋 복사하기
                    </button>
                    <button onclick="editReply()"
                        class="big-btn flex-1 bg-gray-600 hover:bg-gray-700 text-white rounded-2xl transition shadow-lg">
                        ✏️ 수정하기
                    </button>
                </div>
            </div>

            <!-- 샘플 목록 -->
            <div class="bg-white rounded-2xl p-8 shadow-xl border-2 border-gray-100 mb-8">
                <h2 class="text-2xl font-black mb-4">📝 베이스 템플릿 (30종)</h2>
                <p class="text-gray-500 mb-6">생성 버튼을 누르면 아래 템플릿을 조합하여 매번 새로운 답글을 만듭니다 (1,000가지 경우의 수)</p>

                <div id="template-list" class="space-y-3">
                    <!-- JavaScript로 채워짐 -->
                </div>
            </div>

            <!-- 샘플 안내 -->
            <div class="bg-blue-50 border-2 border-blue-200 rounded-2xl p-6 text-center">
                <p class="text-sm text-blue-800 font-bold mb-2">📌 이것은 샘플 버전입니다</p>
                <p class="text-sm text-gray-700">실제 서비스에서는 50종+ 템플릿, AI 맞춤 답글, 자동 게시, 통계 분석 등이 제공됩니다.</p>
                <a href="../index.html"
                    class="inline-block mt-4 bg-purple-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-purple-700 transition">
                    서비스 둘러보기 →
                </a>
            </div>
        </div>
    </div>

            },
            bad: {

                    "소중한 의견 주셔서 감사합니다.",

                ],
                middles: [
                    "말씀해주신 부분 바로 개선하도록 하겠습니다.",
                    "직원 교육을 강화하고 재발 방지에 최선을 다하겠습니다.",

                    "문의해주셔서 기쁩니다.",
                    "질문 주셔서 감사합니다.",
                    "세심한 관심 감사드립니다.",
                    "의견 주신 내용 잘 받았습니다."
                ],
                middles: [
                    "말씀하신 부분은 현재 준비 중입니다.",
                    "해당 메뉴는 계절 한정으로 운영하고 있습니다.",
                    "포장 및 배달도 가능하니 전화로 문의 주세요.",
                    "예약은 전화나 카카오톡으로 받고 있습니다.",
                    "단체 예약은 3일 전에 미리 연락 주시면 감사하겠습니다.",
                    "주중/주말에 따라 운영 시간이 다르니 참고 부탁드립니다.",
                    "매주 새 메뉴를 인스타그램에 공지하고 있습니다.",
                    "제안하신 메뉴는 검토 후 도입을 고려하겠습니다.",
                    "영업시간은 평일 11시~21시, 주말 10시~22시입니다.",
                    "주차는 매장 뒤편 공용 주차장을 이용하시면 됩니다."
                ],
                closings: [
                    "궁금한 점 있으시면 언제든 연락 주세요!",
                    "더 자세한 내용은 전화로 상담해드리겠습니다.",
                    "방문해주셔서 직접 확인하시는 것도 환영입니다!",
                    "항상 관심 가져주셔서 감사합니다!",
                    "앞으로도 많은 이용 부탁드립니다!",
                    "추가 문의 사항은 언제든 연락 주시기 바랍니다.",
                    "좋은 제안 감사하며, 더 나은 서비스로 보답하겠습니다!",
                    "손님의 의견을 적극 반영하겠습니다!",
                    "늘 편안하게 방문해주세요!",
                    "소통해주셔서 정말 감사합니다!"

            }
        };

        function selectCategory(category) {
            currentCategory = category;

            // 탭 활성화 업데이트
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${category}`).classList.add('active');

            // 템플릿 목록 업데이트
            updateTemplateList();

            // 자동 생성
            generateReply();
        }

        function updateTemplateList() {
            const container = document.getElementById('template-list');
            const categoryTemplates = templates[currentCategory];
            const allTemplates = [
                ...categoryTemplates.openings,
                ...categoryTemplates.middles,
                ...categoryTemplates.closings
            ];

            let categoryColor = 'green';
            if (currentCategory === 'bad') categoryColor = 'red';
            if (currentCategory === 'special') categoryColor = 'blue';

            container.innerHTML = allTemplates.map((template, idx) => `
                <div class="p-4 bg-${categoryColor}-50 rounded-xl border-2 border-${categoryColor}-100">
                    <span class="font-bold text-${categoryColor}-600 mr-2">${idx + 1}.</span>
                    <span class="text-gray-700">${template}</span>
                </div>
            `).join('');
        }

        function generateReply() {
            const categoryTemplates = templates[currentCategory];

            const opening = categoryTemplates.openings[Math.floor(Math.random() * categoryTemplates.openings.length)];
            const middle = categoryTemplates.middles[Math.floor(Math.random() * categoryTemplates.middles.length)];
            const closing = categoryTemplates.closings[Math.floor(Math.random() * categoryTemplates.closings.length)];

            const generatedText = `${opening}\n\n${middle}\n\n${closing}`;

            document.getElementById('generated-reply').value = generatedText;
            document.getElementById('generated-reply').readOnly = true;
            isEditing = false;
        }

        function copyReply() {
            const textarea = document.getElementById('generated-reply');
            textarea.select();
            document.execCommand('copy');

            alert('✅ 답글이 클립보드에 복사되었습니다!');
        }

        function editReply() {
            const textarea = document.getElementById('generated-reply');
            if (isEditing) {
                textarea.readOnly = true;
                isEditing = false;
                event.target.textContent = '✏️ 수정하기';
                event.target.classList.remove('bg-green-600', 'hover:bg-green-700');
                event.target.classList.add('bg-gray-600', 'hover:bg-gray-700');
            } else {
                textarea.readOnly = false;
                textarea.focus();
                isEditing = true;
                event.target.textContent = '✅ 수정 완료';
                event.target.classList.remove('bg-gray-600', 'hover:bg-gray-700');
                event.target.classList.add('bg-green-600', 'hover:bg-green-700');
            }
        }

        // 초기 로드
        updateTemplateList();
        generateReply();
    </script>

</body>

</html>
